<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<style>
:root {
    --primary: #E04D00;
    --primary-light: #ff7b3a;
    --primary-dark: #c04100;
    --light-bg: #f8f9fa;
    --gray: #6c757d;
    --dark: #212529;
    --danger: #dc3545;
    --success: #28a745;
    --warning: #ffc107;
    --info: #17a2b8;
    --white: #ffffff;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
    --shadow-xl: 0 12px 48px rgba(0,0,0,0.2);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
}

.left-panel {
    flex: 1.2;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px;
    position: relative;
    overflow: hidden;
}

.left-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
    animation: gradientShift 15s ease-in-out infinite alternate;
}

@keyframes gradientShift {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.2) rotate(10deg); }
}

.left-content {
    z-index: 2;
    max-width: 550px;
    animation: slideInUp 1.2s ease forwards;
    text-align: center;
}

.left-content h1 {
    font-size: 44px;
    font-weight: 800;
    margin-bottom: 25px;
    line-height: 1.2;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.left-content p {
    font-size: 18px;
    line-height: 1.7;
    opacity: 0.9;
    margin-bottom: 35px;
    font-weight: 300;
}

.security-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 35px;
    margin-top: 40px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
}

.security-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #81e6b7, #38b2ac, #4299e1);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.security-card h4 {
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 22px;
    color: #81e6b7;
}

.security-card ul {
    list-style: none;
    padding: 0;
    margin: 0;
    text-align: left;
}

.security-card li {
    padding: 14px 0;
    display: flex;
    align-items: center;
    gap: 15px;
    font-size: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.3s ease;
}

.security-card li:hover {
    transform: translateX(10px);
}

.security-card li:last-child {
    border-bottom: none;
}

.security-card i {
    color: #81e6b7;
    font-size: 18px;
    min-width: 28px;
    background: rgba(129, 230, 183, 0.1);
    padding: 10px;
    border-radius: 10px;
}

.lock-animation {
    width: 200px;
    height: 200px;
    margin: 30px auto;
    position: relative;
    animation: lockFloat 6s ease-in-out infinite;
}

.lock-animation .lock-body {
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 4px solid rgba(255,255,255,0.3);
    box-shadow: 
        0 0 0 15px rgba(255,255,255,0.05),
        0 0 0 30px rgba(255,255,255,0.03);
}

.lock-animation .lock-shackle {
    width: 100px;
    height: 60px;
    border: 8px solid rgba(255,255,255,0.4);
    border-radius: 60px 60px 0 0;
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    border-bottom: none;
    animation: shackleMove 2s ease-in-out infinite;
}

@keyframes lockFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    33% { transform: translateY(-20px) rotate(5deg); }
    66% { transform: translateY(10px) rotate(-5deg); }
}

@keyframes shackleMove {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-10px); }
}

.right-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    animation: fadeInRight 1.2s ease forwards;
}

.login-card {
    width: 100%;
    max-width: 480px;
    background: white;
    border-radius: 28px;
    box-shadow: var(--shadow-xl);
    padding: 50px 45px;
    animation: slideUp 0.8s ease forwards;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.06);
}

.login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--success) 0%, var(--primary) 50%, var(--info) 100%);
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
}

.login-card h3 {
    font-size: 28px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.login-card h3 i {
    color: var(--primary);
    font-size: 32px;
}

.login-card p.text-muted {
    color: var(--gray);
    font-size: 16px;
    margin-bottom: 35px;
    text-align: center;
    line-height: 1.5;
}

.password-requirements {
    background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
    border: 2px solid #e0e7ff;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 25px;
}

.password-requirements h6 {
    color: #4f46e5;
    margin-bottom: 12px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.requirement-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.requirement-list li {
    font-size: 13px;
    color: #64748b;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}

.requirement-list li.valid {
    color: var(--success);
    font-weight: 600;
}

.requirement-list li i {
    font-size: 14px;
    transition: all 0.3s ease;
}

.requirement-list li i.fa-circle {
    color: #cbd5e1;
}

.requirement-list li.valid i.fa-circle {
    display: none;
}

.requirement-list li.valid i.fa-check-circle {
    display: inline;
    color: var(--success);
}

.requirement-list li i.fa-check-circle {
    display: none;
}

.form-group {
    margin-bottom: 25px;
    position: relative;
}

.form-label {
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 10px;
    font-size: 15px;
    display: block;
    transition: all 0.3s ease;
}

.form-group.focused .form-label {
    color: var(--primary);
    transform: translateY(-2px);
}

.password-input-container {
    position: relative;
}

.password-input-container .form-control {
    border-radius: 16px;
    padding: 18px 50px 18px 20px;
    border: 2px solid #e2e8f0;
    font-size: 16px;
    width: 100%;
    background: #f8fafc;
    transition: all 0.3s ease;
    color: var(--dark);
    font-weight: 500;
    letter-spacing: 0.5px;
}

.password-input-container .form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(224, 77, 0, 0.15);
    background: white;
    outline: none;
    transform: translateY(-2px);
}

.password-input-container .form-control.valid {
    border-color: var(--success);
    background: linear-gradient(135deg, #f8fff9 0%, #e8f8ef 100%);
}

.password-input-container .form-control.invalid {
    border-color: var(--danger);
    background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%);
}

.password-toggle {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--gray);
    cursor: pointer;
    font-size: 18px;
    padding: 5px;
    transition: all 0.3s ease;
    z-index: 2;
}

.password-toggle:hover {
    color: var(--primary);
    transform: translateY(-50%) scale(1.1);
}

.password-strength {
    margin-top: 15px;
}

.strength-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.strength-label span {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray);
}

.strength-label .strength-text {
    font-weight: 700;
    font-size: 14px;
}

.strength-meter {
    height: 8px;
    background: #e2e8f0;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
}

.strength-meter::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 100%;
    border-radius: 4px;
    transition: all 0.5s ease;
    background: var(--danger);
}

.strength-meter.weak::after {
    width: 33%;
    background: var(--danger);
}

.strength-meter.medium::after {
    width: 66%;
    background: var(--warning);
}

.strength-meter.strong::after {
    width: 100%;
    background: var(--success);
}

.strength-meter .strength-text.weak {
    color: var(--danger);
}

.strength-meter .strength-text.medium {
    color: var(--warning);
}

.strength-meter .strength-text.strong {
    color: var(--success);
}

.alert {
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 25px;
    border: none;
    position: relative;
    animation: slideDown 0.4s ease;
    backdrop-filter: blur(10px);
    border-left: 5px solid;
}

.alert-success {
    background: linear-gradient(135deg, #d1f7e5 0%, #a3e9c9 100%);
    color: #0c5c2c;
    border-left-color: var(--success);
}

.alert-danger {
    background: linear-gradient(135deg, #ffe5e9 0%, #ffb8c2 100%);
    color: #a61e2d;
    border-left-color: var(--danger);
}

.alert-warning {
    background: linear-gradient(135deg, #fff5e6 0%, #ffe0b3 100%);
    color: #805b36;
    border-left-color: var(--warning);
}

.alert-dismissible .btn-close {
    padding: 1.2rem;
    background-size: 14px;
    opacity: 0.7;
    transition: opacity 0.3s ease;
}

.alert-dismissible .btn-close:hover {
    opacity: 1;
}

.btn-login {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-weight: 700;
    font-size: 17px;
    color: white;
    transition: all 0.3s ease;
    width: 100%;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin: 15px 0 25px 0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 6px 25px rgba(224, 77, 0, 0.25);
}

.btn-login::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.6s;
}

.btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(224, 77, 0, 0.4);
}

.btn-login:hover::before {
    left: 100%;
}

.btn-login:active {
    transform: translateY(-1px);
}

.btn-login.loading {
    pointer-events: none;
    opacity: 0.9;
}

.btn-login i {
    font-size: 18px;
}

.btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.back-login-section {
    text-align: center;
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid #e9ecef;
}

.back-login-section .text-link {
    font-weight: 700;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--primary);
    text-decoration: none;
    transition: all 0.3s ease;
    padding: 10px 20px;
    border-radius: 12px;
    background: rgba(224, 77, 0, 0.08);
}

.back-login-section .text-link:hover {
    background: rgba(224, 77, 0, 0.15);
    transform: translateY(-2px);
    text-decoration: none;
}

.progress-steps {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
    position: relative;
    padding: 0 30px;
}

.progress-steps::before {
    content: '';
    position: absolute;
    top: 15px;
    left: 50px;
    right: 50px;
    height: 3px;
    background: linear-gradient(90deg, var(--primary) 0%, #e2e8f0 100%);
    z-index: 1;
}

.step {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
    flex: 1;
}

.step-number {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #e2e8f0;
    color: var(--gray);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 10px;
    border: 4px solid white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.step-name {
    font-size: 12px;
    color: var(--gray);
    font-weight: 700;
    text-align: center;
    transition: all 0.3s ease;
}

.step.active .step-number {
    background: var(--primary);
    color: white;
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(224, 77, 0, 0.3);
}

.step.active .step-name {
    color: var(--primary);
}

.step.completed .step-number {
    background: var(--success);
    color: white;
}

.step.completed .step-name {
    color: var(--success);
}

.success-message {
    text-align: center;
    padding: 30px;
    animation: fadeIn 0.6s ease;
}

.success-message i {
    font-size: 60px;
    color: var(--success);
    margin-bottom: 20px;
    animation: successPop 0.8s ease;
}

@keyframes successPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@keyframes fadeInRight {
    from { opacity: 0; transform: translateX(50px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInUp {
    from { opacity: 0; transform: translateY(50px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@media (max-width: 992px) {
    body {
        flex-direction: column;
        overflow-y: auto;
        min-height: 100vh;
    }
    
    .left-panel {
        flex: none;
        height: auto;
        min-height: 40vh;
        padding: 40px 20px;
        text-align: center;
    }
    
    .left-content h1 {
        font-size: 32px;
    }
    
    .left-content p {
        font-size: 16px;
    }
    
    .lock-animation {
        width: 160px;
        height: 160px;
    }
    
    .lock-animation .lock-body {
        width: 100px;
        height: 100px;
    }
    
    .right-panel {
        flex: none;
        height: auto;
        padding: 30px 20px;
        min-height: 60vh;
    }
    
    .login-card {
        padding: 35px 25px;
        max-width: 100%;
        margin: -40px 0 0 0;
        border-radius: 24px 24px 0 0;
    }
    
    .security-card {
        margin-top: 20px;
        padding: 25px;
    }
}

@media (max-width: 576px) {
    .login-card {
        padding: 30px 20px;
        border-radius: 20px;
    }
    
    .login-card h3 {
        font-size: 24px;
    }
    
    .login-card h3 i {
        font-size: 26px;
    }
    
    .password-input-container .form-control {
        padding: 16px 45px 16px 18px;
        font-size: 15px;
    }
    
    .btn-login {
        padding: 16px;
        font-size: 16px;
    }
    
    .requirement-list {
        grid-template-columns: 1fr;
    }
    
    .progress-steps {
        padding: 0 15px;
    }
    
    .step-number {
        width: 32px;
        height: 32px;
        font-size: 14px;
        border-width: 3px;
    }
    
    .step-name {
        font-size: 11px;
    }
}
</style>

<body>
    
{% block auth_content %}
<div class="right-panel">
    <div class="login-card">
        <h3>Reset Password 🔐</h3>
        <p class="text-muted mb-4">Create your new password</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post" action="{% url 'reset_password' token=token %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" name="password" 
                       placeholder="Enter new password" required>
                <div class="form-text">Password must be at least 8 characters long.</div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" name="confirm_password" 
                       placeholder="Confirm new password" required>
            </div>
            
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-lock me-2"></i> Reset Password
            </button>
            
            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="text-link">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
</body>
</html>
